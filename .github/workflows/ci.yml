name: Foodie Platform Pipeline (OIDC)

on:
  push:
    branches: [ main, kitchen ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: foodie-app
  ECR_REGISTRY: 243699833421.dkr.ecr.us-east-1.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      working-directory: foodieapp
      run: npm install

    - name: Build app
      working-directory: foodieapp
      run: npm run build

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        role-to-assume: arn:aws:iam::243699833421:role/github-actions-oidc-foodie
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker image
      run: |
        IMAGE_TAG=${{ github.sha }}
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

    - name: Push Docker image
      run: |
        IMAGE_TAG=${{ github.sha }}
        docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Apply
      working-directory: infra
      run: |
        terraform init
        terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

    - name: Get ALB URL from Terraform
      working-directory: infra
      run: |
        ALB_URL=$(terraform output -raw alb_dns_name)
        echo "APP_URL=http://$ALB_URL" >> $GITHUB_ENV

    - name: Run smoke test
      run: bash tests/smoke.sh