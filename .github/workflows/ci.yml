name: Foodie Platform Pipeline (OIDC)

on:
  push:
    branches: [ main, kitchen ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: foodie-app
  ECR_REGISTRY: 243699833421.dkr.ecr.us-east-1.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    # 1. Checkout
    - name: Checkout
      uses: actions/checkout@v3

    # 2. Setup Node
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # 3. Install dependencies
    - name: Install dependencies
      working-directory: foodieapp
      run: npm install

    # 4. Build app
    - name: Build app
      working-directory: foodieapp
      run: npm run build

    # 5. Configure AWS (OIDC - NO HARDCODING)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        role-to-assume: arn:aws:iam::243699833421:role/github-actions-oidc-foodie
        aws-region: ${{ env.AWS_REGION }}

    # 6. Login to ECR
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    # 7. Build Docker image
    - name: Build Docker image
      run: |
        IMAGE_TAG=${{ github.sha }}
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

    # 8. Push Docker image
    - name: Push Docker image
      run: |
        IMAGE_TAG=${{ github.sha }}
        docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 9. Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 10. Terraform Apply (Deploy)
    - name: Terraform Apply
      working-directory: infra
      run: |
        terraform init
        terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

    # ✅ 11. FIXED: Get ALB URL (clean + safe)
    - name: Get ALB URL from Terraform
      id: alb
      working-directory: infra
      run: |
        ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null | tr -d '\n')
        echo "url=http://$ALB_URL" >> $GITHUB_OUTPUT

    # 12. Wait for ECS stabilization
    - name: Wait for service stabilization
      run: sleep 30

    # 13. Smoke test with retry
    - name: Run smoke test (post-deploy)
      run: |
        URL=${{ steps.alb.outputs.url }}
        echo "Testing $URL"

        for i in {1..10}; do
          if curl -f $URL; then
            echo "App is up!"
            exit 0
          fi
          echo "Retrying in 10 seconds..."
          sleep 10
        done

        echo "App failed to respond"
        exit 1

    # 14. Run k6 load test (200+ users ramping)
    - name: Run k6 test
      uses: grafana/k6-action@v0.3.1
      with:
        filename: tests/load.js
      env:
        TARGET_URL: ${{ steps.alb.outputs.url }}