name: Foodie Platform Pipeline (OIDC)

on:
  push:
    branches: [ main, kitchen ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: foodie-app
  ECR_REGISTRY: 243699833421.dkr.ecr.us-east-1.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    # 1. Checkout
    - name: Checkout
      uses: actions/checkout@v3

    # 2. Setup Node
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    # 3. Install dependencies
    - name: Install dependencies
      working-directory: foodieapp
      run: npm install

    # 4. Build app
    - name: Build app
      working-directory: foodieapp
      run: npm run build

    # 5. Smoke test (PRE-DEPLOY)
    - name: Run smoke test (pre-deploy)
      run: bash tests/smoke.sh

    # 6. Configure AWS (OIDC)
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        role-to-assume: arn:aws:iam::243699833421:role/github-actions-oidc-foodie
        aws-region: ${{ env.AWS_REGION }}

    # 7. Login to ECR
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    # 8. Build Docker image
    - name: Build Docker image
      run: |
        IMAGE_TAG=${{ github.sha }}
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

    # 9. Push Docker image
    - name: Push Docker image
      run: |
        IMAGE_TAG=${{ github.sha }}
        docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 10. Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 11. Terraform Apply (Deploy)
    - name: Terraform Apply
      working-directory: infra
      run: |
        terraform init
        terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

    # 12. Get ALB URL
    - name: Get ALB URL from Terraform
      id: alb
      working-directory: infra
      run: |
        ALB_URL=$(terraform output -raw alb_dns_name)
        echo "url=http://$ALB_URL" >> $GITHUB_OUTPUT

    # 13. Wait for ECS stabilization 
    - name: Wait for service stabilization
      run: sleep 30

    # 14. Smoke test
    - name: Run smoke test (post-deploy)
      run: |
        curl -f ${{ steps.alb.outputs.url }}

    # 15. Run k6 load test
    - name: Run k6 test
      uses: grafana/k6-action@v0.3.1
      with:
        filename: tests/load.js
      env:
        TARGET_URL: ${{ steps.alb.outputs.url }}
